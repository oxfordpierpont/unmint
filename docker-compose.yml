services:
  secure-docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://secure-docs-aiconnected-supabase.sec-admn.com}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: https://secure-docs.aiconnected.ai
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://secure-docs-aiconnected-supabase.sec-admn.com}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      DOCS_ADMIN_GITHUB_TOKEN: ${DOCS_ADMIN_GITHUB_TOKEN:-}
      DOCS_ADMIN_GITHUB_REPOSITORY: ${DOCS_ADMIN_GITHUB_REPOSITORY:-oxfordpierpont/unmint}
      DOCS_ADMIN_GITHUB_BRANCH: ${DOCS_ADMIN_GITHUB_BRANCH:-main}
    ports:
      - "3000"
    restart: unless-stopped
